name: Cata
options:
  bundleIdPrefix: com.cata
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""

targets:
  Cata:
    type: application
    platform: iOS
    sources:
      - Cata
      - Shared
    info:
      path: Cata/Info.plist
      properties:
        CFBundleDisplayName: Cata
        NSUserNotificationUsageDescription: "Cata sends mindful reminders and habit nudges."
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cata.app
        CODE_SIGN_ENTITLEMENTS: Cata/Cata.entitlements
    dependencies:
      - target: CataWidget

  CataWidget:
    type: app-extension
    platform: iOS
    sources:
      - CataWidget
      - path: Shared
    info:
      path: CataWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cata.app.widget
        CODE_SIGN_ENTITLEMENTS: CataWidget/CataWidget.entitlements
